<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .circle {
        background-image: linear-gradient(red, green);
        padding: 10px;
        width: 300px;
        height: 300px;
        border-style: solid;
        border-color: transparent;
        border-radius: 50%;
        border-width: 1px;
        animation: rot 1s linear infinite;
        padding: 1px;
      }
      .circle > div {
        background: white;
        height: 299px;
        width: 299px;
        border-style: solid;
        border-color: transparent;
        border-radius: 50%;
        border-width: 1px;
      }

      .circle p {
        animation: none;
      }
      p {
        position: absolute;
        z-index: 10;
        top: 130px;
        left: 35px;
      }
      @keyframes rot {
        0% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(90deg);
        }
        50% {
          transform: rotate(180deg);
        }
        75% {
          transform: rotate(270deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div class="circle">
      <div></div>
    </div>

    <p>Animated Circle with Gradient Border</p>
  </body>
</html>
